---
# Attack configuration

attack:
  graph:
    budget_ratios: [0.01, 0.02, 0.03, 0.05, 0.08, 0.10]
    # Strategy: remove intra-anomaly edges, add edges to normal high-degree nodes

  feature:
    perturbation_bounds: [0.5, 1.0, 2.0, 4.0]
    n_steps: [20, 50, 100]
    lr: 0.01

  evaluation:
    target_classes: [1, 2]  # anomaly and attacker
    metrics:
      - attack_success_rate
      - perturbation_norm
      - detection_rate_before
      - detection_rate_after
